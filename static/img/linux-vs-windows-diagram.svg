<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 486" width="100%" style="max-width:680px" role="img" aria-label="리눅스와 윈도우의 쉘-커널 구조 비교">
<title>리눅스와 윈도우의 쉘-커널 구조 비교</title>
<desc>리눅스는 쉘이 시스템 콜을 통해 바로 커널에 요청하는 반면, 윈도우는 쉘과 NT 커널 사이에 Win32 API라는 추가 계층이 있음을 보여주는 비교 구조도</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
  text { font-family: Arial, Helvetica, sans-serif; }
  .title { font-size: 14px; font-weight: 600; }
  .subtitle { font-size: 12px; font-weight: 400; }
  .header { font-size: 14px; font-weight: 600; }
  .conn { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
</style>

<text x="190" y="44" text-anchor="middle" class="header" fill="#2C2C2A">Linux</text>
<text x="490" y="44" text-anchor="middle" class="header" fill="#2C2C2A">Windows</text>

<rect x="60" y="60" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="190" y="78" text-anchor="middle" dominant-baseline="central" class="title" fill="#085041">Shell</text>
<text x="190" y="100" text-anchor="middle" dominant-baseline="central" class="subtitle" fill="#0F6E56">bash, zsh — 명령을 실행</text>

<rect x="360" y="60" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="490" y="78" text-anchor="middle" dominant-baseline="central" class="title" fill="#085041">PowerShell / cmd</text>
<text x="490" y="100" text-anchor="middle" dominant-baseline="central" class="subtitle" fill="#0F6E56">명령을 실행</text>

<line x1="190" y1="116" x2="190" y2="280" class="conn" marker-end="url(#arrow)"/>
<text x="190" y="198" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#5F5E5A">(시스템 콜)</text>

<line x1="490" y1="116" x2="490" y2="170" class="conn" marker-end="url(#arrow)"/>

<rect x="360" y="170" width="260" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="490" y="188" text-anchor="middle" dominant-baseline="central" class="title" fill="#712B13">Win32 API</text>
<text x="490" y="210" text-anchor="middle" dominant-baseline="central" class="subtitle" fill="#993C1D">대부분의 앱이 거치는 추가 계층</text>

<line x1="490" y1="226" x2="490" y2="280" class="conn" marker-end="url(#arrow)"/>

<rect x="60" y="280" width="260" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="190" y="298" text-anchor="middle" dominant-baseline="central" class="title" fill="#3C3489">Kernel</text>
<text x="190" y="320" text-anchor="middle" dominant-baseline="central" class="subtitle" fill="#534AB7">하드웨어를 직접 제어</text>

<rect x="360" y="280" width="260" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="490" y="298" text-anchor="middle" dominant-baseline="central" class="title" fill="#3C3489">NT kernel</text>
<text x="490" y="320" text-anchor="middle" dominant-baseline="central" class="subtitle" fill="#534AB7">하드웨어를 직접 제어</text>

<line x1="190" y1="336" x2="190" y2="390" class="conn" marker-end="url(#arrow)"/>
<line x1="490" y1="336" x2="490" y2="390" class="conn" marker-end="url(#arrow)"/>

<rect x="60" y="390" width="260" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="190" y="408" text-anchor="middle" dominant-baseline="central" class="title" fill="#444441">Hardware</text>
<text x="190" y="430" text-anchor="middle" dominant-baseline="central" class="subtitle" fill="#5F5E5A">CPU, 메모리, 디스크, 장치</text>

<rect x="360" y="390" width="260" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="490" y="408" text-anchor="middle" dominant-baseline="central" class="title" fill="#444441">Hardware</text>
<text x="490" y="430" text-anchor="middle" dominant-baseline="central" class="subtitle" fill="#5F5E5A">CPU, 메모리, 디스크, 장치</text>

</svg>
