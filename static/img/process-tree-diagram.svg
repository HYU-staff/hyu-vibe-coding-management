<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 482" width="100%" style="max-width:680px" role="img" aria-label="사용자, 쉘, 어플리케이션, 커널의 관계도">
<title>사용자, 쉘, 어플리케이션, 커널의 관계도</title>
<desc>사용자는 쉘과 어플리케이션 양쪽에 직접 명령을 내릴 수 있고, 쉘은 또 다른 어플리케이션을 실행시킬 수 있으며, 결국 모든 프로세스는 각자 독립적으로 커널과 통신한다.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
  text { font-family: Arial, Helvetica, sans-serif; }
  .title { font-size: 14px; font-weight: 600; }
  .subtitle { font-size: 12px; font-weight: 400; }
  .conn { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
</style>

<rect x="260" y="20" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="42" text-anchor="middle" dominant-baseline="central" class="title" fill="#444441">User</text>

<line x1="340" y1="64" x2="340" y2="94" class="conn"/>
<path d="M340 94 L210 94 L210 124" class="conn" marker-end="url(#arrow)"/>
<path d="M340 94 L470 94 L470 124" class="conn" marker-end="url(#arrow)"/>

<rect x="100" y="124" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="210" y="142" text-anchor="middle" dominant-baseline="central" class="title" fill="#085041">Shell</text>
<text x="210" y="164" text-anchor="middle" dominant-baseline="central" class="subtitle" fill="#0F6E56">여기에 명령어를 입력</text>

<rect x="360" y="124" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="470" y="142" text-anchor="middle" dominant-baseline="central" class="title" fill="#085041">App (직접 실행)</text>
<text x="470" y="164" text-anchor="middle" dominant-baseline="central" class="subtitle" fill="#0F6E56">더블클릭으로 실행</text>

<line x1="210" y1="180" x2="210" y2="260" class="conn" marker-end="url(#arrow)"/>
<path d="M320 152 L340 152 L340 386" class="conn" marker-end="url(#arrow)"/>
<line x1="470" y1="180" x2="470" y2="386" class="conn" marker-end="url(#arrow)"/>

<rect x="100" y="260" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="210" y="278" text-anchor="middle" dominant-baseline="central" class="title" fill="#085041">App (쉘이 실행)</text>
<text x="210" y="300" text-anchor="middle" dominant-baseline="central" class="subtitle" fill="#0F6E56">예: node app.js</text>

<line x1="210" y1="316" x2="210" y2="386" class="conn" marker-end="url(#arrow)"/>

<rect x="70" y="386" width="540" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="404" text-anchor="middle" dominant-baseline="central" class="title" fill="#3C3489">Kernel</text>
<text x="340" y="426" text-anchor="middle" dominant-baseline="central" class="subtitle" fill="#534AB7">모든 프로세스가 직접 통신</text>

</svg>
