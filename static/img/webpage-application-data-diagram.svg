<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 482" width="100%" style="max-width:680px" role="img" aria-label="웹페이지, 어플리케이션, 데이터의 관계">
<title>웹페이지, 어플리케이션, 데이터의 관계</title>
<desc>사용자는 웹페이지를 보고 조작하고, 웹페이지는 어플리케이션(서버 프로그램)에 요청과 응답을 주고받으며, 어플리케이션은 데이터를 조회하거나 저장한다.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
  text { font-family: Arial, Helvetica, sans-serif; }
  .title { font-size: 14px; font-weight: 600; }
  .subtitle { font-size: 12px; font-weight: 400; }
  .conn { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
</style>

<rect x="260" y="20" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="42" text-anchor="middle" dominant-baseline="central" class="title" fill="#444441">사용자</text>

<line x1="340" y1="64" x2="340" y2="134" class="conn" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text x="360" y="99" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#5F5E5A">보고 조작</text>

<rect x="190" y="134" width="300" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="152" text-anchor="middle" dominant-baseline="central" class="title" fill="#085041">웹페이지</text>
<text x="340" y="174" text-anchor="middle" dominant-baseline="central" class="subtitle" fill="#0F6E56">브라우저 화면 (HTML/CSS/JS)</text>

<line x1="340" y1="190" x2="340" y2="260" class="conn" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text x="360" y="225" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#5F5E5A">요청 · 응답 (HTTP)</text>

<rect x="190" y="260" width="300" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="278" text-anchor="middle" dominant-baseline="central" class="title" fill="#3C3489">어플리케이션</text>
<text x="340" y="300" text-anchor="middle" dominant-baseline="central" class="subtitle" fill="#534AB7">요청을 처리하는 서버 프로그램</text>

<line x1="340" y1="316" x2="340" y2="386" class="conn" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text x="360" y="351" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#5F5E5A">조회 · 저장</text>

<rect x="190" y="386" width="300" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="404" text-anchor="middle" dominant-baseline="central" class="title" fill="#444441">데이터</text>
<text x="340" y="426" text-anchor="middle" dominant-baseline="central" class="subtitle" fill="#5F5E5A">데이터베이스, 파일 등 저장소</text>

</svg>
